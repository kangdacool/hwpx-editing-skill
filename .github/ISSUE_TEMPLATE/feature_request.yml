name: 💡 Feature request
description: Suggest an improvement — a new edit type, export, or guide rule.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "제안 감사합니다! Keep it concise — what problem, and roughly how you'd like it solved."
  - type: textarea
    id: problem
    attributes:
      label: What problem are you hitting? / 어떤 문제·불편인가요?
      description: The real pain, not just the solution.
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Proposed idea / 제안하는 방향
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Anything else? / 그 외 (예시 문서 구조 · 한글 버전 등)
    validations:
      required: false
