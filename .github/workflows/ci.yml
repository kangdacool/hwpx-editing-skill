name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps (lxml core + openpyxl for the table-export test)
        run: pip install lxml openpyxl
      - name: Run selftest (proves the repacker is lossless)
        run: python skills/hwpx-editing/scripts/selftest.py
